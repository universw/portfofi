<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="SecureVault Infrastructure as Code — AWS architecture overview">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="55%" stop-color="#2d1167"/>
      <stop offset="100%" stop-color="#0f0524"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg)"/>
  <rect width="1200" height="750" fill="url(#grid)"/>
  <circle cx="900" cy="180" r="320" fill="url(#glow)"/>
  <circle cx="220" cy="640" r="280" fill="url(#glow)" opacity="0.65"/>

  <!-- Header chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700">
    <rect x="60" y="60" rx="999" ry="999" width="170" height="44" fill="#7c3aed" fill-opacity="0.18" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="145" y="89" text-anchor="middle" fill="#e9d5ff">TERRAFORM</text>

    <rect x="246" y="60" rx="999" ry="999" width="100" height="44" fill="#f59e0b" fill-opacity="0.16" stroke="#fbbf24" stroke-width="1.5"/>
    <text x="296" y="89" text-anchor="middle" fill="#fde68a">AWS</text>

    <rect x="362" y="60" rx="999" ry="999" width="120" height="44" fill="#10b981" fill-opacity="0.16" stroke="#34d399" stroke-width="1.5"/>
    <text x="422" y="89" text-anchor="middle" fill="#a7f3d0">IaC</text>
  </g>

  <!-- Title -->
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="68" font-weight="800" fill="#ffffff" letter-spacing="-1.5">SecureVault</text>
  <text x="60" y="252" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#c4b5fd">Infrastructure as Code</text>

  <!-- Service grid -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    <!-- row 1 -->
    <g>
      <rect x="60" y="320" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="80" y="358" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">COMPUTE</text>
      <text x="80" y="392" font-size="22">Lambda</text>
    </g>
    <g>
      <rect x="296" y="320" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="316" y="358" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">API</text>
      <text x="316" y="392" font-size="22">API Gateway</text>
    </g>
    <g>
      <rect x="532" y="320" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="552" y="358" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">STORAGE</text>
      <text x="552" y="392" font-size="22">S3 + KMS</text>
    </g>
    <g>
      <rect x="768" y="320" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="788" y="358" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">DATA</text>
      <text x="788" y="392" font-size="22">DynamoDB</text>
    </g>

    <!-- row 2 -->
    <g>
      <rect x="60" y="440" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="80" y="478" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">AUTH</text>
      <text x="80" y="512" font-size="22">Cognito</text>
    </g>
    <g>
      <rect x="296" y="440" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="316" y="478" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">CDN</text>
      <text x="316" y="512" font-size="22">CloudFront</text>
    </g>
    <g>
      <rect x="532" y="440" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="552" y="478" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">IDENTITY</text>
      <text x="552" y="512" font-size="22">IAM</text>
    </g>
    <g>
      <rect x="768" y="440" width="220" height="100" rx="14" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="788" y="478" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="2">OBSERVE</text>
      <text x="788" y="512" font-size="22">CloudWatch</text>
    </g>
  </g>

  <!-- Footer environments -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="600">
    <text x="60" y="640" fill="#9ca3af">$ terraform apply</text>
    <text x="60" y="672" fill="#6b7280">— modules/  environments/{ dev · staging · prod }</text>

    <rect x="884" y="618" width="86" height="36" rx="999" fill="#10b981" fill-opacity="0.18" stroke="#34d399" stroke-width="1"/>
    <text x="927" y="643" text-anchor="middle" fill="#a7f3d0">dev</text>

    <rect x="980" y="618" width="86" height="36" rx="999" fill="#f59e0b" fill-opacity="0.18" stroke="#fbbf24" stroke-width="1"/>
    <text x="1023" y="643" text-anchor="middle" fill="#fde68a">staging</text>

    <rect x="1076" y="618" width="86" height="36" rx="999" fill="#ef4444" fill-opacity="0.18" stroke="#f87171" stroke-width="1"/>
    <text x="1119" y="643" text-anchor="middle" fill="#fecaca">prod</text>
  </g>
</svg>
