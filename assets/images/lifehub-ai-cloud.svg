<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" role="img" aria-label="LifeHub AI Cloud Architecture — React, Firebase, Google Cloud, Terraform">
  <defs>
    <linearGradient id="bg-lifehub" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#11224a"/>
      <stop offset="100%" stop-color="#0a3d62"/>
    </linearGradient>
    <linearGradient id="card-lifehub" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.04"/>
    </linearGradient>
    <radialGradient id="glow-lifehub" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4dabff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4dabff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid-lifehub" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="750" fill="url(#bg-lifehub)"/>
  <rect width="1200" height="750" fill="url(#grid-lifehub)"/>
  <circle cx="900" cy="180" r="320" fill="url(#glow-lifehub)"/>
  <circle cx="220" cy="640" r="280" fill="url(#glow-lifehub)" opacity="0.65"/>

  <!-- Header chips -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" font-weight="700">
    <rect x="60" y="60" rx="999" ry="999" width="86" height="44" fill="#4dabff" fill-opacity="0.18" stroke="#7ec3ff" stroke-width="1.5"/>
    <text x="103" y="89" text-anchor="middle" fill="#dceaff">GCP</text>

    <rect x="154" y="60" rx="999" ry="999" width="120" height="44" fill="#ffa94d" fill-opacity="0.16" stroke="#ffc078" stroke-width="1.5"/>
    <text x="214" y="89" text-anchor="middle" fill="#ffe8cc">Firebase</text>

    <rect x="282" y="60" rx="999" ry="999" width="124" height="44" fill="#9b87f5" fill-opacity="0.18" stroke="#b8a5ff" stroke-width="1.5"/>
    <text x="344" y="89" text-anchor="middle" fill="#e6dcff">Terraform</text>

    <rect x="414" y="60" rx="999" ry="999" width="86" height="44" fill="#6bcf7f" fill-opacity="0.16" stroke="#81e6b9" stroke-width="1.5"/>
    <text x="457" y="89" text-anchor="middle" fill="#c6f6d5">React</text>
  </g>

  <!-- Title -->
  <text x="60" y="200" font-family="Inter, system-ui, sans-serif" font-size="62" font-weight="800" fill="#ffffff" letter-spacing="-1.5">LifeHub AI Cloud</text>
  <text x="60" y="252" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="500" fill="#7ec3ff">Personal Productivity Workspace</text>

  <!-- Service grid -->
  <g font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">
    <!-- row 1 -->
    <g>
      <rect x="60" y="320" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="80" y="358" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">AUTH</text>
      <text x="80" y="392" font-size="22">Firebase Auth</text>
    </g>
    <g>
      <rect x="296" y="320" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="316" y="358" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">DATABASE</text>
      <text x="316" y="392" font-size="22">Firestore</text>
    </g>
    <g>
      <rect x="532" y="320" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="552" y="358" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">STORAGE</text>
      <text x="552" y="392" font-size="22">Cloud Storage</text>
    </g>
    <g>
      <rect x="768" y="320" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="788" y="358" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">HOSTING</text>
      <text x="788" y="392" font-size="22">Firebase + CDN</text>
    </g>

    <!-- row 2 -->
    <g>
      <rect x="60" y="440" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="80" y="478" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">FRONTEND</text>
      <text x="80" y="512" font-size="22">React + Vite</text>
    </g>
    <g>
      <rect x="296" y="440" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="316" y="478" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">SECURITY</text>
      <text x="316" y="512" font-size="22">User Isolation</text>
    </g>
    <g>
      <rect x="532" y="440" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="552" y="478" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">AUDIT LOG</text>
      <text x="552" y="512" font-size="22">Activity History</text>
    </g>
    <g>
      <rect x="768" y="440" width="220" height="100" rx="14" fill="url(#card-lifehub)" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1.5"/>
      <text x="788" y="478" font-size="14" font-weight="600" fill="#7ec3ff" letter-spacing="2">IAC</text>
      <text x="788" y="512" font-size="22">Terraform · GCP</text>
    </g>
  </g>

  <!-- Footer tech stack -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" font-weight="600">
    <text x="60" y="640" fill="#9ca3af">$ terraform apply  &amp;&amp;  firebase deploy</text>
    <text x="60" y="672" fill="#6b7280">— React · Vite · Firebase · GCP · Terraform</text>

    <rect x="880" y="618" width="70" height="36" rx="999" fill="#4dabff" fill-opacity="0.18" stroke="#7ec3ff" stroke-width="1"/>
    <text x="915" y="643" text-anchor="middle" fill="#7ec3ff">live</text>

    <rect x="960" y="618" width="86" height="36" rx="999" fill="#ffa94d" fill-opacity="0.18" stroke="#ffc078" stroke-width="1"/>
    <text x="1003" y="643" text-anchor="middle" fill="#ffc078">secure</text>

    <rect x="1056" y="618" width="70" height="36" rx="999" fill="#9b87f5" fill-opacity="0.18" stroke="#b8a5ff" stroke-width="1"/>
    <text x="1091" y="643" text-anchor="middle" fill="#b8a5ff">IaC</text>
  </g>
</svg>
